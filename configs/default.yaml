# ── Data ─────────────────────────────────────────────────────────────────────
data:
  root: data/raw
  processed_root: data/processed
  augmented_root: data/augmented
  image_size: 256          # height & width fed to the network
  num_workers: 4
  pin_memory: true

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  backbone: resnet50       # timm model name used as encoder
  pretrained: true
  num_classes: 2           # authentic vs forged
  decoder_channels: [256, 128, 64, 32]

# ── Training ──────────────────────────────────────────────────────────────────
train:
  epochs: 50
  batch_size: 16
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  lr_scheduler: cosine     # cosine | step | plateau
  early_stopping_patience: 10
  seed: 42
  device: cuda             # cuda | cpu | mps
  mixed_precision: true

# ── Loss ──────────────────────────────────────────────────────────────────────
loss:
  cls_weight: 1.0          # classification branch weight
  seg_weight: 1.0          # segmentation / localization branch weight

# ── Evaluation ────────────────────────────────────────────────────────────────
eval:
  batch_size: 32
  threshold: 0.5           # binary decision threshold for the mask

# ── Paths ─────────────────────────────────────────────────────────────────────
paths:
  weights_dir: weights
  logs_dir: runs/logs
  checkpoint_dir: runs/checkpoints
